<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>hansen 静涵 含盐｜报告总站</title>
    <!-- Google Fonts: Inter (The closest open source match to San Francisco) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'sans-serif'],
            },
            colors: {
              background: '#F7F7F4',
              surface: '#FFFFFF',
              surfaceHighlight: '#EFEFEB',
              primary: '#111111',
              secondary: '#555555',
              accent: '#2997FF',     // Apple System Blue
              success: '#30D158',    // Apple System Green
              warning: '#FF9F0A',    // Apple System Orange
              danger: '#FF453A',     // Apple System Red
            },
            backgroundImage: {
              'gradient-radial': 'radial-gradient(var(--tw-gradient-stops))',
              'subtle-glow': 'conic-gradient(from 180deg at 50% 50%, #F7F7F4 0deg, #EFEFEB 180deg, #F7F7F4 360deg)',
            },
            animation: {
              'fade-in': 'fadeIn 0.8s ease-out forwards',
            },
            keyframes: {
              fadeIn: {
                '0%': { opacity: '0', transform: 'translateY(10px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              }
            }
          },
        },
      }
    </script>
    <style>
      /* Smooth scrolling */
      html {
        scroll-behavior: smooth;
      }
      
      body {
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      /* Hide scrollbar but allow scrolling */
      body::-webkit-scrollbar {
        width: 0px; 
        background: transparent; 
      }

      /* Report-style cards */
      .bento-card {
        background-color: rgba(255, 255, 255, 0.72);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(17, 17, 17, 0.08);
      }
      
      .text-balance {
        text-wrap: balance;
      }

      .line-clamp-2 {
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }

      .markdown-report h1,
      .markdown-report h2,
      .markdown-report h3 {
        color: #111111;
        font-weight: 650;
        letter-spacing: 0;
      }

      .markdown-report h1 {
        font-size: 2.25rem;
        line-height: 1.15;
        margin: 2.25rem 0 1rem;
      }

      .markdown-report h2 {
        font-size: 1.75rem;
        line-height: 1.25;
        margin: 2.5rem 0 1rem;
        padding-top: 1.25rem;
        border-top: 1px solid rgba(17, 17, 17, 0.12);
      }

      .markdown-report h3 {
        font-size: 1.2rem;
        line-height: 1.35;
        margin: 1.75rem 0 0.75rem;
      }

      .markdown-report p,
      .markdown-report li {
        color: #404040;
        font-size: 1rem;
        line-height: 1.8;
      }

      .markdown-report ul,
      .markdown-report ol {
        margin: 1rem 0 1.5rem;
        padding-left: 1.5rem;
      }

      .markdown-report li {
        margin: 0.35rem 0;
      }

      .markdown-report blockquote {
        margin: 1.5rem 0;
        padding: 1rem 1.25rem;
        border-left: 3px solid #111111;
        background: rgba(255, 255, 255, 0.55);
      }

      .markdown-report table {
        width: 100%;
        border-collapse: collapse;
        margin: 1.5rem 0;
        font-size: 0.95rem;
      }

      .markdown-report th,
      .markdown-report td {
        border-bottom: 1px solid rgba(17, 17, 17, 0.12);
        padding: 0.75rem 0.5rem;
        text-align: left;
      }

      .markdown-report code {
        background: rgba(17, 17, 17, 0.06);
        border-radius: 4px;
        padding: 0.1rem 0.35rem;
      }

      .markdown-report pre {
        overflow-x: auto;
        background: #111111;
        color: #f7f7f4;
        padding: 1rem;
        border-radius: 6px;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "lucide-react": "https://esm.sh/lucide-react@^0.562.0",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "framer-motion": "https://esm.sh/framer-motion@^12.24.0"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body class="bg-[#f7f7f4] text-[#111111] antialiased selection:bg-[#111111] selection:text-white">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
